<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script>
        setTimeout(function() {
            const React = window.React;
            const ReactDOM = window.ReactDOM;
            const { useState } = React;

            if (!React || !ReactDOM) {
                document.getElementById('root').innerHTML = '<div style="color: white; padding: 20px;">Loading React...</div>';
                return;
            }

            const App = () => {
              const [scene, setScene] = useState('start');

              return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(to bottom right, #0f172a, #1e3a8a, #0f172a)', color: 'white', padding: '24px' }}>
                  <div style={{ maxWidth: '640px', margin: '0 auto' }}>
                    <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                      <div style={{ fontSize: '60px', marginBottom: '16px' }}>🔬</div>
                      <h1 style={{ fontSize: '36px', fontWeight: 'bold', color: '#06b6d4' }}>Science Quest</h1>
                    </div>
                    
                    <div style={{ background: 'rgba(30, 41, 59, 0.5)', border: '1px solid rgba(6, 182, 212, 0.3)', borderRadius: '8px', padding: '32px', marginBottom: '32px' }}>
                      <p style={{ fontSize: '18px' }}>Welcome! You're about to become a real scientist.</p>
                      <p style={{ marginTop: '16px' }}>Learn how science really works through interactive missions.</p>
                    </div>
                    
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                      <button onClick={() => setScene('matter')} style={{ width: '100%', padding: '16px', background: '#2563eb', color: 'white', borderRadius: '8px', border: 'none', cursor: 'pointer', fontSize: '16px', fontWeight: '500' }}>
                        Start Matter Mission →
                      </button>
                      <button onClick={() => setScene('method')} style={{ width: '100%', padding: '16px', background: '#2563eb', color: 'white', borderRadius: '8px', border: 'none', cursor: 'pointer', fontSize: '16px', fontWeight: '500' }}>
                        Learn Scientific Method →
                      </button>
                    </div>
                  </div>
                </div>
              );
            };

            ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        }, 500);
    </script>
</body>
</html>
