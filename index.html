<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .emoji {
            font-size: 60px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: bold;
            color: #06b6d4;
        }
        
        .content {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .content p {
            margin-bottom: 12px;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden {
            display: none;
        }
        
        .feedback {
            margin-top: 16px;
            padding: 16px;
            background: rgba(34, 197, 94, 0.3);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 6px;
            color: #86efac;
        }
    </style>
</head>
